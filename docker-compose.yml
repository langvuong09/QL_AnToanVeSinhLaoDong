services:
  db:
    image: postgres:15-alpine
    container_name: vna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vna_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vna_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7-alpine
    container_name: vna-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vna-backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      VNA_PORT: 3010
      VNA_DB_HOST: db
      VNA_DB_PORT: 5432
      VNA_DB_USER: postgres
      VNA_DB_PASSWORD: postgres
      VNA_DB_DATABASE: vna_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3010:3010"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_ENDPOINT=http://localhost:3010
    container_name: vna-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data: