services:
  db:
    image: postgres:15-alpine
    container_name: vna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vna_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vna-backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      VNA_PORT: 3010
      VNA_DB_HOST: db
      VNA_DB_PORT: 5432
      VNA_DB_USER: postgres
      VNA_DB_PASSWORD: postgres
      VNA_DB_DATABASE: vna_db
    ports:
      - "3010:3010"

volumes:
  postgres_data: